<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – CoreNode</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; background: var(--bg-base); }
    .auth-card { width: 100%; max-width: 420px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem 2rem; position: relative; overflow: hidden; }
    .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, #9d5cf6 70%, transparent 100%); }
    .auth-logo { display: flex; align-items: center; gap: 0.6rem; justify-content: center; margin-bottom: 2rem; font-size: 1.1rem; font-weight: 800; font-family: 'Orbitron', sans-serif; color: var(--text-primary); text-decoration: none; }
    .auth-logo .logo-icon { background: linear-gradient(135deg, var(--accent), #00c97a); color: #000; font-weight: 900; font-size: 0.85rem; width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0,255,156,.35); }
    .auth-title { text-align: center; margin-bottom: 1.75rem; }
    .auth-title h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.35rem; }
    .auth-title p { font-size: 0.85rem; color: var(--text-secondary); }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-secondary); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .auth-error { background: rgba(220,38,38,.1); border: 1px solid rgba(220,38,38,.3); color: #f87171; border-radius: var(--radius); padding: 0.75rem 1rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .auth-success { background: rgba(22,163,74,.1); border: 1px solid rgba(22,163,74,.3); color: #4ade80; border-radius: var(--radius); padding: 0.75rem 1rem; font-size: 0.83rem; margin-bottom: 1rem; display: none; }
    .password-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <div class="logo-icon">CN</div>
      CoreNode
    </a>

    <div class="auth-title">
      <h1>Create account</h1>
      <p>Deploy your first server in minutes</p>
    </div>

    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success"></div>

    <div class="form-group">
      <label class="form-label" for="signup-email">Email Address</label>
      <input class="form-input" id="signup-email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label" for="signup-password">Password</label>
      <input class="form-input" id="signup-password" type="password" placeholder="Min 6 characters" autocomplete="new-password" />
      <div class="password-hint">Minimum 6 characters</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="signup-confirm">Confirm Password</label>
      <input class="form-input" id="signup-confirm" type="password" placeholder="Repeat password" autocomplete="new-password" />
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="signup-btn" style="margin-top:0.5rem">
      Create Account
    </button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const session = await AuthManager.init();
    if (session) { window.location.href = 'dashboard.html'; return; }

    const btn        = document.getElementById('signup-btn');
    const errEl      = document.getElementById('auth-error');
    const succEl     = document.getElementById('auth-success');
    const emailEl    = document.getElementById('signup-email');
    const passEl     = document.getElementById('signup-password');
    const confirmEl  = document.getElementById('signup-confirm');

    function showError(msg)   { errEl.textContent  = msg; errEl.style.display  = 'block'; succEl.style.display = 'none'; }
    function showSuccess(msg) { succEl.textContent = msg; succEl.style.display = 'block'; errEl.style.display  = 'none'; }

    async function doSignup() {
      const email    = emailEl.value.trim();
      const password = passEl.value;
      const confirm  = confirmEl.value;

      if (!email || !password || !confirm) { showError('Please fill in all fields.'); return; }
      if (password.length < 6)             { showError('Password must be at least 6 characters.'); return; }
      if (password !== confirm)            { showError('Passwords do not match.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email.'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating account…';
      errEl.style.display = 'none';

      const { error } = await AuthManager.signUp(email, password);
      if (error) {
        showError(error.message || 'Sign up failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      showSuccess('Account created! Check your email to confirm, then sign in.');
      btn.textContent = 'Done!';
      setTimeout(() => { window.location.href = 'login.html'; }, 3000);
    }

    btn.addEventListener('click', doSignup);
    [emailEl, passEl, confirmEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); }));
  });
</script>
</body>
</html>
