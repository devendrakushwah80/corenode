<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – CoreNodeAdmin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  
</head>
<body>

<main class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div style="display:inline-flex;align-items:center;gap:0.6rem;font-size:1.1rem;font-weight:800;margin-bottom:0.25rem;">
        <div class="logo-icon">CN</div>
        CoreNodeAdmin
      </div>
      <div style="font-size:0.83rem;color:var(--text-muted);margin-top:0.35rem">Admin Panel</div>
    </div>

    <!-- Error Alert -->
    <div id="admin-login-error" class="alert alert-danger hidden" role="alert" style="margin-bottom:1rem">
      Invalid username or password.
    </div>

    <!-- Login Form -->
    <form id="admin-login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="admin-username">Username</label>
        <input
          class="form-input"
          id="admin-username"
          type="text"
          placeholder="admin"
          autocomplete="username"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="admin-password">Password</label>
        <div style="position:relative;">
          <input
            class="form-input"
            id="admin-password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            style="padding-right:2.75rem"
          />
          <button
            type="button"
            id="toggle-pw"
            style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;"
            aria-label="Toggle password visibility"
          >
            <svg id="eye-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>
      </div>

      <button
        type="submit"
        id="admin-login-btn"
        class="btn btn-primary btn-full btn-lg"
        style="margin-top:0.5rem"
      >
        Sign In
      </button>
    </form>

    <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);text-align:center;">
      <a href="index.html" style="font-size:0.83rem;color:var(--text-muted);transition:color 0.15s;" onmouseover="this.style.color='var(--text-secondary)'" onmouseout="this.style.color='var(--text-muted)'">
        ← Back to website
      </a>
    </div>

  </div>
</main>

<script>
  // Password visibility toggle
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('admin-password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
</body>
</html>
